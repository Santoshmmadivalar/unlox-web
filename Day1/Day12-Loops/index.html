<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops Example</title>
</head>
<body>

<script>
    // For loop (0 to 10)
    for (let i = 0; i <= 10; i++) {
        console.log("The value is", i);
    }

    // Reverse for loop (10 to 0)
    for (let y = 10; y >= 0; y--) {
        console.log("The value is", y);
    }

    // While loop
    let count = 1;

    while (count < 5) {
        console.log("The value is", count);
        count++;
    }

    // Do...while loop
    let number = 3;

    do {
        console.log("The value is", number);
        number++;
    } while (number <= 5);

</script>

</body>
</html>
