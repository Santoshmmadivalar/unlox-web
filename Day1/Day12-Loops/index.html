<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        for(let i=0; i<=10;i++){
            console.log("The value is" ,i)
        }
        for(let y=10;y<=0;y++){
            console.log("The value is",y)
        }

        let count = 1
        while(count<5)
        {
            console.log("The value is", count)
            count++
        }
        let number=3
        do{
            console.log("The value is",number)
            number++
        }
    </script>
</body>
</html>
