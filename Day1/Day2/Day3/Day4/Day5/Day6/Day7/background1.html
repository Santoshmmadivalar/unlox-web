<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner Example</title>

    <style>
        body {
            margin: 0;
            font-family: cursive;
        }

        .banner {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;

            /* Background image */
            background-image: url("https://images.pexels.com/photos/33666589/pexels-photo-33666589.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            /* Overlay effect */
            position: relative;
        }

        .banner::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); /* dark overlay */
            z-index: 1;
        }

        .banner h1 {
            position: relative;
            z-index: 2;
            font-size: 3rem;
            text-shadow: 2px 2px 5px black;
            filter:saturate();
        }
    </style>
</head>

<body>
    <div class="banner">
        <h1>Cafe Coffee Day</h1>
    </div>
</body>
</html>
