<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #abc{
            background-color: aquamarine;
            height:100px;
            width:200px;
        }
        #abc{
            transition: 2s;
            transition: 2s background-color, 2s height, 2s width;
            transform: rotateX('angle');
        }
        }
    </style>
</head>
<body>
    <div id="abc">abc</div>
</body>
</html>
