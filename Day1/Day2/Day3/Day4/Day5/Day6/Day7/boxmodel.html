<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
             background-color: rgb(245, 238, 219);
        }

        .container {
            display: flex;
            gap: 20px;
            margin-top: 50px;
            background-color: #f5f5f5;
            box-shadow: 0em 10px 5px black
        }

        .card {
            border: 1px solid black;
            padding: 15px;
            width: 200px;
            text-align: center;
            background-color: white;
            border-radius: 10px;
            background-color: #f5f5f5;
            box-shadow: 0em 10px 5px black
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            background-color: #f5f5f5;
            box-shadow: 0em 10px 5px black
        }

        .card button {
            margin-top: 10px;
            padding: 8px 12px;
            border: none;
            background-color: black;
            color: white;
            cursor: pointer;
            background-color: #f5f5f5;
            box-shadow: 0em 10px 5px black
        }

        .card button:hover {
            background-color: gray;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">
        <h3>Mobile</h3>
        <img src="https://images.pexels.com/photos/36503100/pexels-photo-36503100.jpeg">
        <p>iPhone</p>
        <p>$600</p>
        <button>Add to cart</button>
    </div>

    <div class="card">
        <h3>Laptop</h3>
        <img src="https://images.pexels.com/photos/18105/pexels-photo.jpg">
        <p>MacBook</p>
        <p>$1200</p>
        <button>Add to cart</button>
    </div>

    <div class="card">
        <h3>Headphones</h3>
        <img src="https://images.pexels.com/photos/3394650/pexels-photo-3394650.jpeg">
        <p>Wireless Headphones</p>
        <p>$150</p>
        <button>Add to cart</button>
    </div>

</div>

</body>
</html>
