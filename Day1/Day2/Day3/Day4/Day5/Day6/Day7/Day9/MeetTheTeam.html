<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .team {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 15px;
            width: 200px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        h1 {
            margin-bottom: 30px;
        }
    </style>
</head>

<body>
    <h1>Meet Our Awesome Team</h1>

    <div class="team">
        <div class="card">
            <img src="https://images.pexels.com/photos/32703420/pexels-photo-32703420.jpeg">
            <h2>John Doe</h2>
            <p>Lead Developer</p>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/32703420/pexels-photo-32703420.jpeg">
            <h2>Jane Smith</h2>
            <p>UI/UX Designer</p>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/32703420/pexels-photo-32703420.jpeg">
            <h2>Emily Johnson</h2>
            <p>Marketing Manager</p>
        </div>
    </div>
</body>
</html>
