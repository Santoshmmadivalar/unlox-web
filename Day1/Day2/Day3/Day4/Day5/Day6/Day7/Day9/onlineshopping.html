<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Grid</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: cornsilk;
            margin: 0;
        }

        /* GRID CONTAINER */
        .products {
            background-color: white;
            margin: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        /* INDIVIDUAL PRODUCT */
        .product {
            text-align: center;
            border: 1px solid #ccc;
            padding: 10px;
            overflow: hidden;
            background: #f9f9f9;
        }

        .product img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        button {
            padding: 8px 12px;
            border: none;
            background: black;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="products">

        <div class="product">
            <img src="https://images.pexels.com/photos/25020272/pexels-photo-25020272.jpeg">
            <h2>Camera</h2>
            <p>$100</p>
            <button>Add to cart</button>
        </div>

        <div class="product">
            <img src="https://images.pexels.com/photos/5850340/pexels-photo-5850340.jpeg">
            <h2>Smartphone</h2>
            <p>$300</p>
            <button>Add to cart</button>
        </div>

        <div class="product">
            <img src="https://images.pexels.com/photos/25020272/pexels-photo-25020272.jpeg">
            <h2>Laptop</h2>
            <p>$500</p>
            <button>Add to cart</button>
        </div>

        <div class="product">
            <img src="https://images.pexels.com/photos/14650678/pexels-photo-14650678.jpeg">
            <h2>Headphones</h2>
            <p>$10</p>
            <button>Add to cart</button>
        </div>

        <div class="product">
            <img src="https://images.pexels.com/photos/5850340/pexels-photo-5850340.jpeg">
            <h2>Coke</h2>
            <p>$12</p>
            <button>Add to cart</button>
        </div>

    </div>

</body>
</html>
