<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <style>

        .Products{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 10px;
            height: 100vh;
        }

        .Box{
            border: 1px solid black;
            width: 120px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: lightblue;
            font-style: italic;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div class="Products">
        <div class="Box">Cake</div>
        <div class="Box">Pastry</div>
        <div class="Box">Bread</div>
    </div>

</body>
</html>
