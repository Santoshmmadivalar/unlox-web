<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            color:red;
            animation: glow 1s  infinite alternate;               
        }
        @keyframes glow{
            from{
                text-shadow: 0 0 10px skyblue;
            }
            to{
                text-shadow: 0 0 20px skyblue, 0 0 30px skyblue;
            }
        }
    </style>
</head>
<body>
    <h1>Neon Text Glow</h1>
</body>
</html>
